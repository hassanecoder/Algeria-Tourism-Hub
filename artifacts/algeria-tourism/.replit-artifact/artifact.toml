kind = "web"
previewPath = "/"
title = "Algeria Tourism"
version = "1.0.0"
id = "artifacts/algeria-tourism"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22041

[services.development]
run = "pnpm --filter @workspace/algeria-tourism run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/algeria-tourism", "run", "build" ]
publicDir = "artifacts/algeria-tourism/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22041"
BASE_PATH = "/"
